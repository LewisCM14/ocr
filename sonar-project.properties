# SonarQube Project Configuration for OCR Pipeline
sonar.projectKey=ocr-pipeline
sonar.projectName=OCR Pipeline
sonar.projectVersion=0.1.0

# Source configuration
sonar.sources=pipeline,scripts
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.14

# Exclusions: avoid scanning virtualenvs, build artifacts and large binary assets
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/venv/**,**/dist/**,**/build/**,**/*.tif,**/*.tiff,**/*.png,**/*.jpg,**/*.jpeg
sonar.test.exclusions=**/__pycache__/**,**/.venv/**,**/venv/**

# Coverage report (pytest-cov XML output)
sonar.python.coverage.reportPaths=coverage.xml
